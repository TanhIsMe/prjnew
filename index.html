                html = `<div style="text-align:center; padding: 40px 10px;"><a href="https://drive.google.com/file/d/1BvIeoHL2MySoevNwlrrcRr-xy_ISRt7R/view?usp=drivesdk" target="_blank" class="game-btn" style="background: linear-gradient(135deg, #be185d, var(--pink)); display:inline-block; text-decoration:none; box-shadow: 0 0 20px rgba(255,0,127,0.6); max-width:250px;"><i class="fas fa-play-circle"></i> ${t('tab_video')}</a></div>`;
            }
        } else {
            if (tab === 'aim') {
                html = `
                    <div style="width:100%; max-width:600px; margin: 0 auto; padding-top:5px;">
                        <h4 style="color:var(--cyan); text-shadow: 0 0 15px var(--cyan); margin-bottom: 20px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:18px; font-family:'Orbitron'; width:100%;">
                            <i class="fas fa-crosshairs"></i> AIMBOT
                        </h4>
                        <div style="background: rgba(249,115,22,0.1); border: 1px dashed var(--ff-orange); border-radius: 8px; padding: 10px; margin-bottom: 15px; text-align: center;">
                            <span style="color: var(--ff-orange); font-size: 12px; font-weight: 800; text-shadow: 0 0 5px rgba(249,115,22,0.5);">
                                <i class="fas fa-exclamation-triangle"></i> LƯU Ý: Nếu đã bật "Aim Body Holo", sau đó bật các Aim khác thì vẫn sẽ dính hiệu ứng Holo!
                            </span>
                        </div>
                        <div class="aim-filter-bar">
                            <button class="aim-filter-btn active" data-filter="all">Tất cả</button>
                            <button class="aim-filter-btn" data-filter="aim">Aim</button>
                            <button class="aim-filter-btn" data-filter="esp">ESP</button>
                            <button class="aim-filter-btn" data-filter="aim2019">Aim 2019</button>
                        </div>
                        <div id="aimListContainer"></div>
                    </div>`;
            } else if (tab === 'chams') {
                html = `
                    <div style="width:100%; max-width:600px; margin: 0 auto; padding-top:5px;">
                        <h4 style="color:var(--cyan); text-shadow: 0 0 15px var(--cyan); margin-bottom: 20px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:18px; font-family:'Orbitron'; width:100%;">
                            <i class="fas fa-eye"></i> MENU CHAMS
                        </h4>
                        <div id="chamsListContainer"></div>
                    </div>`;
            } else if (tab === 'settings') {
                html = `
                    <div style="width:100%; max-width:400px; margin: 0 auto; padding-top:5px;">
                        <h4 style="color:var(--cyan); text-shadow: 0 0 15px var(--cyan); margin-bottom: 25px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:16px; font-family:'Orbitron';"><i class="fas fa-cog"></i> CÀI ĐẶT GIAO DIỆN</h4>
                        <div style="text-align:left; margin-bottom: 15px; background:rgba(0,0,0,0.6); padding:15px; border-radius:12px; border:1px solid rgba(168,85,247,0.5); box-shadow: inset 0 0 15px rgba(0,0,0,0.8);">
                            <label style="color:#c4b5fd; font-weight:bold; font-size:12px;">Độ sáng tổng thể: <span id="brightValText">${window.solBrightness}%</span></label>
                            <input type="range" id="brightSlider" min="20" max="150" value="${window.solBrightness}" style="width:100%; margin-top:8px; cursor:pointer;">
                        </div>
                        <div style="text-align:left; margin-bottom: 15px; background:rgba(0,0,0,0.6); padding:15px; border-radius:12px; border:1px solid rgba(168,85,247,0.5); box-shadow: inset 0 0 15px rgba(0,0,0,0.8);">
                            <label style="color:#c4b5fd; font-weight:bold; font-size:12px;">Độ nháy viền Neon: <span id="neonValText">${window.solNeon}%</span></label>
                            <input type="range" id="neonSlider" min="0" max="300" value="${window.solNeon}" style="width:100%; margin-top:8px; cursor:pointer;">
                        </div>
                        <div style="display:flex; gap:10px;">
                            <div style="flex:1; text-align:center; background:rgba(0,0,0,0.6); padding:10px; border-radius:12px; border:1px solid rgba(168,85,247,0.5); box-shadow: inset 0 0 15px rgba(0,0,0,0.8);">
                                <label style="display:block; color:#c4b5fd; font-weight:bold; font-size:11px; margin-bottom:5px;">Màu Chính</label>
                                <input type="color" id="primaryColorPicker" value="${window.solPrimaryColor}" style="cursor:pointer; width:100%; height:35px; border:none; background:transparent; padding:0;">
                            </div>
                            <div style="flex:1; text-align:center; background:rgba(0,0,0,0.6); padding:10px; border-radius:12px; border:1px solid rgba(168,85,247,0.5); box-shadow: inset 0 0 15px rgba(0,0,0,0.8);">
                                <label style="display:block; color:#c4b5fd; font-weight:bold; font-size:11px; margin-bottom:5px;">Màu Phụ</label>
                                <input type="color" id="secondaryColorPicker" value="${window.solSecondaryColor}" style="cursor:pointer; width:100%; height:35px; border:none; background:transparent; padding:0;">
                            </div>
                        </div>
                    </div>`;
            } else if (tab === 'account') {
                let badgeTag = '';
                if (accountRole === 'admin') badgeTag = '<span class="boss-icon">BOSS</span>';
                else if (accountRole === 'mod') badgeTag = '<span class="mod-icon">MOD</span>';
                let displayRole = accountRole;
                if (accountRole === 'mod') displayRole = 'PHÓ NHÓM';
                let canChangeName = accountRole !== 'mod';
                let editIcon = canChangeName ? '<i class="fas fa-edit" style="font-size:10px; margin-left:6px; color:var(--cyan); text-shadow:0 0 5px var(--cyan);"></i>' : '';
                let idNameBtn = canChangeName ? 'id="btnChangeName"' : '';
                let cursorStyle = canChangeName ? 'cursor:pointer;' : '';
                let titleAttr = canChangeName ? 'title="Nhấn để đổi tên"' : '';
                html = `
                    <div style="width:100%; max-width:400px; margin: 0 auto; display:flex; gap: 20px; align-items:center;">
                        <div style="text-align:center; flex-shrink:0;">
                            <img id="accountAvatarImg" src="${defaultAvatar}" class="account-avatar-img" style="width:90px; height:90px;">
                            <div style="font-size:11px; color:#c4b5fd; margin-top:12px; text-shadow:0 0 10px var(--purp); font-weight:bold; letter-spacing:1px;">[ ĐỔI ẢNH ]</div>
                        </div>
                        <div style="flex: 1;">
                            <div style="background:rgba(0,0,0,0.6); padding:14px; border-radius:12px; font-size:12px; margin-bottom:15px; border:1px solid rgba(168,85,247,0.5); box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 10px rgba(168,85,247,0.2);">
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:6px; align-items:center;">
                                    <span style="color:#c4b5fd; font-weight:bold;">Tài khoản:</span> 
                                    <b ${idNameBtn} style="color:#fff; display:flex; align-items:center; ${cursorStyle} text-shadow:0 0 5px #fff;" ${titleAttr}>
                                        ${displayName} ${editIcon} ${badgeTag}
                                    </b>
                                </div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:6px;"><span style="color:#c4b5fd; font-weight:bold;">Chức vụ:</span> <b style="color:var(--ff-orange); text-transform:uppercase; text-shadow:0 0 10px var(--ff-orange);">${displayRole}</b></div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:6px;"><span style="color:#c4b5fd; font-weight:bold;">Gói thẻ:</span> <b style="color:var(--cyan); text-transform:uppercase; text-shadow:0 0 10px var(--cyan);">${accountType}</b></div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:6px;"><span style="color:#c4b5fd; font-weight:bold;">IP:</span> <b class="live-ip-display" style="color:#fff; text-shadow:0 0 5px #fff;">${clientIP}</b></div>
                                <div style="display:flex; justify-content:space-between;"><span style="color:#c4b5fd; font-weight:bold;">Thiết bị:</span> <b style="color:#fff; text-shadow:0 0 5px #fff; text-align:right;">${clientDevice}</b></div>
                            </div>
                            <button class="game-btn" id="logoutBtn" style="background: linear-gradient(135deg, #be123c, var(--red-mnt)); box-shadow: 0 0 20px rgba(239,68,68,0.7);"><i class="fas fa-power-off"></i> ĐĂNG XUẤT</button>
                        </div>
                    </div>`;
            } else if (tab === 'chat') {
                html = `
                    <div class="chat-container">
                        <div style="text-align:center; padding: 10px; background:rgba(0,0,0,0.8); color:var(--cyan); font-weight:900; font-family:'Orbitron'; font-size:12px; border-bottom:1px solid rgba(0,255,255,0.2); box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index:10; text-shadow:0 0 10px var(--cyan);">
                            <i class="fas fa-users"></i> Tài khoản trực tuyến: <span id="onlineCountText" style="color:#fff; text-shadow:0 0 10px #fff; font-size:14px; margin-left:6px;">Đang tải...</span>
                        </div>
                        <div class="chat-box" id="chatBox"></div>
                        <div class="chat-input-wrapper">
                            <div class="chat-input-area">
                                <div class="chat-plus-btn"><i class="fas fa-plus" style="font-size:11px;"></i></div>
                                <input class="game-input" id="chatInput" placeholder="Nhập tin nhắn..." autocomplete="off">
                                <button class="chat-send-btn" id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>`;
            }
        }
        contentDiv.innerHTML = html;

        if (!isLoggedIn && tab === 'login') {
            document.getElementById('loginFormGame').addEventListener('submit', async e => {
                e.preventDefault();
                const d = new URLSearchParams(new FormData(e.target));
                d.append('action','login'); d.append('csrf_token', csrf);
                d.append('device_id', solDeviceId); d.append('device_info', clientDevice);
                const r = await fetch('', {method:'POST', body: d});
                const data = await r.json();
                if (data.s === 'success') { sessionStorage.setItem('autoOpenMenu', '1'); location.reload(); } 
                else Swal.fire({icon:'error', title:'Lỗi Đăng Nhập', text:data.m, background:'#05020a', color:'#fff'});
            });
        }
        if (isLoggedIn && tab === 'settings') {
            document.getElementById('brightSlider').addEventListener('input', (e) => {
                window.solBrightness = e.target.value; document.getElementById('brightValText').innerText = window.solBrightness + '%';
                document.body.style.filter = `brightness(${window.solBrightness}%)`; localStorage.setItem('sol_brightness', window.solBrightness);
            });
            document.getElementById('neonSlider').addEventListener('input', (e) => {
                window.solNeon = e.target.value; document.getElementById('neonValText').innerText = window.solNeon + '%';
                document.documentElement.style.setProperty('--neon-scale', window.solNeon / 100); localStorage.setItem('sol_neon', window.solNeon);
            });
            document.getElementById('primaryColorPicker').addEventListener('input', (e) => {
                window.solPrimaryColor = e.target.value; document.documentElement.style.setProperty('--cyan', window.solPrimaryColor); localStorage.setItem('sol_primary', window.solPrimaryColor);
            });
            document.getElementById('secondaryColorPicker').addEventListener('input', (e) => {
                window.solSecondaryColor = e.target.value; document.documentElement.style.setProperty('--purp', window.solSecondaryColor); localStorage.setItem('sol_secondary', window.solSecondaryColor);
            });
        }
        if (isLoggedIn && tab === 'account') {
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                const fd = new URLSearchParams();
                fd.append('action', 'logout');
                fd.append('csrf_token', csrf);
                await fetch('', { method: 'POST', body: fd });
                location.reload();
            });
            document.getElementById('accountAvatarImg').addEventListener('click', () => document.getElementById('globalAvatarInput').click());
            const btnChangeName = document.getElementById('btnChangeName');
            if(btnChangeName) {
                btnChangeName.addEventListener('click', () => {
                    Swal.fire({
                        title: '<span style="color:var(--cyan); font-family:\'Orbitron\'; text-shadow:0 0 15px var(--cyan);">ĐỔI TÊN HIỂN THỊ</span>',
                        input: 'text', inputValue: displayName, inputAttributes: { maxlength: 25 },
                        showCancelButton: true, confirmButtonText: 'LƯU', cancelButtonText: 'HỦY', background: '#05020a', color: '#fff',
                        customClass: { popup: 'swal-sol-popup', confirmButton: 'sol-btn-ok' }
                    }).then(async (res) => {
                        if(res.isConfirmed && res.value.trim() !== '') {
                            const fd = new URLSearchParams(); fd.append('action', 'change_name'); fd.append('csrf_token', csrf); fd.append('new_name', res.value.trim());
                            const r = await fetch('', {method:'POST', body:fd}); const d = await r.json();
                            if(d.s === 'success'){
                                Swal.fire({icon:'success', title:'Thành công', text:'Đã cập nhật tên!', timer:1500, showConfirmButton:false, background:'#05020a', color:'#fff'});
                                setTimeout(() => location.reload(), 1500);
                            } else { if (d.kick) handleKick(); else Swal.fire({icon:'error', text:d.m, background:'#05020a', color:'#fff'}); }
                        }
                    });
                });
            }
        }
        if (isLoggedIn && tab === 'aim') {
            renderAimList(currentAimFilter);
            document.querySelectorAll('.aim-filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.aim-filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active'); currentAimFilter = this.dataset.filter; renderAimList(currentAimFilter);
                });
            });
        }
        if (isLoggedIn && tab === 'chams') {
            renderChamsList();
        }
        if (isLoggedIn && tab === 'chat') { initChat(); }
    }

    if (isLoggedIn) {
        setInterval(async () => {
            try {
                const fd = new URLSearchParams(); fd.append('action', 'auth_check'); fd.append('csrf_token', csrf);
                const r = await fetch('', {method: 'POST', body: fd}); const data = await r.json();
                if (data.kick) handleKick();
                else if (data.total_members !== undefined) { const countEl = document.getElementById('onlineCountText'); if (countEl) countEl.innerText = data.total_members; }
            } catch (err) {}
        }, 3000);

        setInterval(async () => {
            if (accountType === 'free' && activeAim === 'no_antena') {
                let exp = localStorage.getItem('sol_free_expire');
                if (exp && Date.now() > parseInt(exp)) {
                    const fd = new URLSearchParams(); fd.append('action', 'toggle_aim'); fd.append('csrf_token', csrf); fd.append('aim_id', 'no_antena'); fd.append('state', 0);
                    await fetch('', {method:'POST', body: fd});
                    activeAim = null; localStorage.removeItem('sol_active_aim'); localStorage.removeItem('sol_free_expire');
                    Swal.fire({icon:'warning', title:'HẾT GIỜ', text:'Thời gian sử dụng miễn phí kết thúc.', background:'#05020a', color:'#fff', confirmButtonColor: '#ef4444'});
                    if (currentTab === 'aim') renderAimList(currentAimFilter);
                    if (currentTab === 'chams') renderChamsList();
                }
            }
        }, 5000);
    }

    document.getElementById('globalAvatarInput').addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
            const fd = new URLSearchParams(); fd.append('action','upload_avatar'); fd.append('csrf_token', csrf); fd.append('image', ev.target.result);
            const r = await fetch('', {method:'POST', body: fd}); const data = await r.json();
            if (data.kick) { handleKick(); return; }
            if (data.s === 'success') {
                defaultAvatar = data.avatar; 
                if(document.getElementById('miniAvatar')) document.getElementById('miniAvatar').src = defaultAvatar;
                if(document.getElementById('accountAvatarImg')) document.getElementById('accountAvatarImg').src = defaultAvatar;
                Swal.fire({icon:'success', title:'OK', text:'Đã đổi Avatar!', timer:1500, showConfirmButton:false, background:'#05020a', color:'#fff'});
            }
        };
        reader.readAsDataURL(file);
    });

    function initChat() {
        lastChatTime = 0; loadChat();
        chatInterval = setInterval(pollChat, 2000);
        document.getElementById('chatSendBtn').addEventListener('click', sendMessage);
        document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput'); const msg = input.value.trim(); if (!msg) return;
        input.value = '';
        try {
            const fd = new URLSearchParams(); fd.append('action','chat_send'); fd.append('csrf_token', csrf); fd.append('message', msg);
            const r = await fetch('', {method:'POST', body: fd}); const d = await r.json();
            if (d.kick) { handleKick(); return; }
            if (d.s === 'error') Swal.fire({icon:'error', text:d.m, toast:true, position:'top-end', showConfirmButton:false, timer:3000, background:'#111', color:'#fff'});
            pollChat();
        } catch (err) {}
    }

    function renderMessage(m) {
        if (!m) return '';
        const timeVal = m.time ? m.time * 1000 : Date.now();
        const timeStr = new Date(timeVal).toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
        const safeUser = m.user || 'User';
        const char = safeUser.charAt(0).toUpperCase();
        const fallback = `data:image/svg+xml;base64,` + btoa(unescape(encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"><rect width="36" height="36" fill="#1e1f22"/><text x="18" y="24" font-size="16" text-anchor="middle" fill="#fff" font-weight="bold" font-family="Arial">${char}</text></svg>`)));
        const avatarSrc = m.avatar && m.avatar.length > 50 ? m.avatar : fallback;
        let nameColor = '#fff'; let badgeTag = '';
        if (m.role === 'admin') { nameColor = 'var(--red-mnt)'; badgeTag = '<span class="boss-icon">BOSS</span>'; }
        else if (m.role === 'mod') { nameColor = 'var(--ff-orange)'; badgeTag = '<span class="mod-icon">MOD</span>'; }
        else if (safeUser === 'Bot 🤖' || safeUser === 'Hệ Thống 🔴') { nameColor = 'var(--cyan)'; }
        let textMsg = m.message || '';
        textMsg = textMsg.replace(/@(everyone|all)/gi, '<span style="color:var(--red-mnt); font-weight:800; background:rgba(239,68,68,0.3); padding:2px 6px; border-radius:4px; border:1px solid rgba(239,68,68,0.8); box-shadow:0 0 10px rgba(239,68,68,0.5);">@$1</span>');
        return `
            <div class="chat-msg">
                <img src="${avatarSrc}" class="chat-avatar" onerror="this.src='${fallback}'">
                <div class="chat-content-wrap">
                    <div class="chat-msg-header"><span class="chat-user" style="color:${nameColor}">${safeUser} ${badgeTag}</span><span class="chat-time">${timeStr}</span></div>
                    <div class="chat-text">${textMsg}</div>
                </div>
            </div>`;
    }

    async function loadChat() {
        if (!isLoggedIn) return;
        try {
            const fd = new URLSearchParams(); fd.append('action','chat_poll'); fd.append('csrf_token', csrf); fd.append('since', 0);
            const r = await fetch('', {method:'POST', body: fd}); const data = await r.json();
            if (data.kick) { handleKick(); return; }
            const chatBox = document.getElementById('chatBox');
            if (chatBox && data.messages) {
                let html = ''; data.messages.forEach(m => { html += renderMessage(m); if (m.time > lastChatTime) lastChatTime = m.time; });
                chatBox.innerHTML = html; chatBox.scrollTop = chatBox.scrollHeight;
            }
            if (data.total_members !== undefined) { const countEl = document.getElementById('onlineCountText'); if (countEl) countEl.innerText = data.total_members; }
        } catch (err) {}
    }

    async function pollChat() {
        if (!isLoggedIn) return;
        try {
            const fd = new URLSearchParams(); fd.append('action','chat_poll'); fd.append('csrf_token', csrf); fd.append('since', lastChatTime);
            const r = await fetch('', {method:'POST', body: fd}); const data = await r.json();
            if (data.kick) { handleKick(); return; }
            const chatBox = document.getElementById('chatBox');
            if (chatBox && data.messages && data.messages.length > 0) {
                let scrolledToBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 50;
                data.messages.forEach(m => { chatBox.insertAdjacentHTML('beforeend', renderMessage(m)); lastChatTime = Math.max(lastChatTime, m.time); });
                if (scrolledToBottom) chatBox.scrollTop = chatBox.scrollHeight;
            }
            if (data.total_members !== undefined) { const countEl = document.getElementById('onlineCountText'); if (countEl) countEl.innerText = data.total_members; }
        } catch(err) {}
    }

    let currentScale = 1;
    document.getElementById('shrinkTextBtn').addEventListener('click', () => {
        Swal.fire({
            title: '<span style="color:var(--cyan); font-family:\'Orbitron\'; font-size:18px; text-shadow:0 0 10px var(--cyan);">TÙY CHỈNH KÍCH THƯỚC</span>',
            html: `
                <div style="display:flex; justify-content:center; align-items:center; gap:25px; margin-top:20px; margin-bottom:20px;">
                    <button id="btnZoomOut" style="width:50px; height:50px; font-size:18px; font-weight:bold; border-radius:50%; background:transparent; border:2px solid var(--pink); color:var(--pink); cursor:pointer; transition:0.3s; box-shadow:0 0 15px rgba(255,0,127,0.6);">A-</button>
                    <span id="scaleDisplay" style="font-size:22px; font-weight:900; font-family:'Orbitron'; color:#fff; width:70px; text-shadow:0 0 15px #fff;">100%</span>
                    <button id="btnZoomIn" style="width:50px; height:50px; font-size:22px; font-weight:bold; border-radius:50%; background:transparent; border:2px solid var(--cyan); color:var(--cyan); cursor:pointer; transition:0.3s; box-shadow:0 0 15px rgba(0,255,255,0.6);">A+</button>
                </div>
            `,
            background: '#05020a', showConfirmButton: true, confirmButtonText: 'ĐÓNG', customClass: { popup: 'swal-sol-popup', confirmButton: 'sol-btn-ok' },
            didOpen: () => {
                const updateDisplay = () => { document.getElementById('scaleDisplay').innerText = Math.round(currentScale * 100) + '%'; document.body.style.zoom = currentScale; };
                updateDisplay();
                document.getElementById('btnZoomOut').onclick = () => { if (currentScale > 0.5) { currentScale -= 0.1; updateDisplay(); } };
                document.getElementById('btnZoomIn').onclick = () => { if (currentScale < 1.5) { currentScale += 0.1; updateDisplay(); } };
            }
        });
    });
    </script>
</body>
</html>
